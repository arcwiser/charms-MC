plugins {
    id 'java'
}

group = 'com.germanware'
version = '1.0.0'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
}

repositories {
    mavenCentral()
    maven {
        name = 'papermc'
        url = uri('https://repo.papermc.io/repository/maven-public/')
    }
}

dependencies {
    compileOnly 'io.papermc.paper:paper-api:26.1.2.build.40-alpha'
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}
